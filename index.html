<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traffic Control System - Exclusive Manual Control</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Inter', 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
      min-height: 100vh;
      color: #fff;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .header h1 {
      font-size: 2.5rem;
      font-weight: 300;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #fff, #4facfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-badge {
      display: inline-block;
      margin-top: 10px;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 0.85rem;
      background: rgba(79, 172, 254, 0.2);
      border: 1px solid rgba(79, 172, 254, 0.3);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 25px;
      margin-bottom: 25px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 25px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card-title {
      font-size: 1.2rem;
      font-weight: 500;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid rgba(79, 172, 254, 0.5);
      display: inline-block;
    }

    .traffic-light {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      background: rgba(0, 0, 0, 0.5);
      padding: 20px;
      border-radius: 50px;
      width: 120px;
      margin: 0 auto;
    }

    .light {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #2a2a2a;
      transition: all 0.1s ease;
      cursor: pointer;
    }

    .light.red.active {
      background: #ff0000;
      box-shadow: 0 0 30px #ff0000;
    }

    .light.yellow.active {
      background: #ffff00;
      box-shadow: 0 0 30px #ffff00;
    }

    .light.green.active {
      background: #00ff00;
      box-shadow: 0 0 30px #00ff00;
    }

    .countdown-container {
      text-align: center;
      margin-top: 20px;
    }

    .countdown {
      font-size: 5rem;
      font-weight: bold;
      font-family: 'Courier New', monospace;
      letter-spacing: 5px;
      background: linear-gradient(135deg, #fff, #4facfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .control-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 15px;
    }

    .control-buttons button {
      padding: 10px 20px;
      font-size: 1rem;
    }

    .btn-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-top: 15px;
    }

    button {
      padding: 12px 15px;
      background: rgba(79, 172, 254, 0.2);
      border: 1px solid rgba(79, 172, 254, 0.3);
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    button:hover {
      background: rgba(79, 172, 254, 0.4);
      transform: scale(1.02);
    }

    button:active {
      transform: scale(0.98);
    }

    button.active {
      background: #4facfe;
      border-color: #4facfe;
      box-shadow: 0 0 15px rgba(79, 172, 254, 0.5);
    }

    button.danger {
      background: rgba(255, 0, 0, 0.2);
      border-color: rgba(255, 0, 0, 0.3);
    }

    button.danger.active {
      background: #ff0000;
      border-color: #ff0000;
    }

    button.success.active {
      background: #00ff00;
      border-color: #00ff00;
      color: #000;
    }

    .history-table {
      width: 100%;
      overflow-x: auto;
      max-height: 400px;
      overflow-y: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    th {
      font-weight: 500;
      color: #4facfe;
      position: sticky;
      top: 0;
      background: rgba(26, 26, 46, 0.95);
    }

    .status-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .status-active {
      background: #00ff00;
      box-shadow: 0 0 5px #00ff00;
    }

    .mode-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: bold;
    }

    .mode-auto {
      background: rgba(79, 172, 254, 0.3);
      color: #4facfe;
    }

    .mode-manual {
      background: rgba(255, 165, 0, 0.3);
      color: #ffa500;
    }

    .mode-off {
      background: rgba(255, 0, 0, 0.3);
      color: #ff0000;
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .countdown {
        font-size: 3rem;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>TRAFFIC CONTROL SYSTEM</h1>
      <div class="status-badge">
        <span class="status-indicator status-active"></span> EXCLUSIVE MANUAL CONTROL
      </div>
    </div>

    <div class="grid">
      <!-- Traffic Light Visual -->
      <div class="card">
        <div class="card-title">TRAFFIC LIGHT</div>
        <div class="traffic-light">
          <div class="light red" id="redLight"></div>
          <div class="light yellow" id="yellowLight"></div>
          <div class="light green" id="greenLight"></div>
        </div>
        <div class="countdown-container">
          <div class="countdown" id="countdown">30</div>
          <div class="control-buttons">
            <button onclick="resetCycle()">RESET CYCLE</button>
          </div>
        </div>
        <div id="currentState" style="text-align: center; margin-top: 10px;"></div>
      </div>

      <!-- System Control -->
      <div class="card">
        <div class="card-title">SYSTEM CONTROL</div>
        <div class="btn-group">
          <button id="toggleSystem" class="active" onclick="toggleSystem()">🔄 SYSTEM ACTIVE</button>
        </div>
        <div style="margin-top: 20px;">
          <div style="margin-bottom: 10px;">MODE: <span id="systemStatus" class="mode-badge mode-auto">AUTOMATIC</span>
          </div>
          <div>COUNTDOWN SPEED: <span id="speedDisplay">1x</span></div>
          <input type="range" id="speedControl" min="0.5" max="2" step="0.1" value="1"
            onchange="changeSpeed(this.value)">
        </div>
      </div>

      <!-- Manual Control - Exclusive Mode -->
      <div class="card">
        <div class="card-title">MANUAL OVERRIDE (EXCLUSIVE)</div>
        <div class="btn-group">
          <button id="manualRedBtn" class="danger" onclick="manualControl('RED')">🔴 RED LIGHT</button>
          <button id="manualYellowBtn" onclick="manualControl('YELLOW')">🟡 YELLOW LIGHT</button>
          <button id="manualGreenBtn" class="success" onclick="manualControl('GREEN')">🟢 GREEN LIGHT</button>
        </div>
        <div class="btn-group" style="margin-top: 10px;">
          <button id="buzzerBtn" onclick="manualControl('BUZZER')">🔊 TEST BUZZER</button>
          <button id="espLedBtn" onclick="manualControl('LED')">💡 ESP32 LED</button>
        </div>
        <div style="margin-top: 10px; font-size: 0.8rem; color: #4facfe; text-align: center;">
          ⚡ Only ONE function works at a time
        </div>
      </div>
    </div>

    <!-- History -->
    <div class="card">
      <div class="card-title">LIGHT HISTORY</div>
      <div class="history-table">
        <table>
          <thead>
            <tr>
              <th>TIME</th>
              <th>STATE</th>
              <th>COUNTDOWN</th>
              <th>MODE</th>
            </tr>
          </thead>
          <tbody id="historyBody">
            <tr>
              <td colspan="4" style="text-align: center;">Loading...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://aatapixarmkgyyyctbmm.supabase.co/rest/v1/traffic_light';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhdGFwaXhhcm1rZ3l5eWN0Ym1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MTA0MjIsImV4cCI6MjA5MDE4NjQyMn0.r6-kIZEgDO9A2GAGDs1JRXCNVFBPLk1Nut5XPCVxQf8';

    // State variables
    let currentState = "RED";
    let countdown = 30;
    let systemEnabled = true;
    let manualMode = false;
    let manualLed = "";
    let speed = 1;
    let timerInterval = null;
    let history = [];

    const TIMINGS = {
      RED: 30,
      YELLOW: 10,
      GREEN: 30
    };

    function init() {
      updateDisplay();
      startCountdown();
      loadHistory();
      setInterval(loadHistory, 2000);
    }

    function startCountdown() {
      if (timerInterval) clearInterval(timerInterval);

      timerInterval = setInterval(() => {
        if (systemEnabled && !manualMode) {
          if (countdown > 0) {
            countdown--;
            updateDisplay();
            sendToSupabase();
          } else {
            nextState();
          }
        }
      }, 1000 / speed);
    }

    function nextState() {
      if (currentState === "RED") {
        currentState = "GREEN";
        countdown = TIMINGS.GREEN;
      } else if (currentState === "GREEN") {
        currentState = "YELLOW";
        countdown = TIMINGS.YELLOW;
      } else if (currentState === "YELLOW") {
        currentState = "RED";
        countdown = TIMINGS.RED;
      }

      updateDisplay();
      sendToSupabase();
      addToHistory();
    }

    function updateDisplay() {
      document.getElementById('redLight').classList.remove('active');
      document.getElementById('yellowLight').classList.remove('active');
      document.getElementById('greenLight').classList.remove('active');

      if (currentState === "RED") {
        document.getElementById('redLight').classList.add('active');
        document.getElementById('currentState').innerHTML = 'STOP - Red Light';
      } else if (currentState === "YELLOW") {
        document.getElementById('yellowLight').classList.add('active');
        document.getElementById('currentState').innerHTML = 'READY - Yellow Light';
      } else if (currentState === "GREEN") {
        document.getElementById('greenLight').classList.add('active');
        document.getElementById('currentState').innerHTML = 'GO - Green Light';
      }

      document.getElementById('countdown').innerHTML = countdown;
      const countdownEl = document.getElementById('countdown');
      countdownEl.style.transform = 'scale(1.1)';
      setTimeout(() => {
        countdownEl.style.transform = 'scale(1)';
      }, 100);
    }

    async function sendToSupabase() {
      const data = {
        state: currentState,
        countdown: countdown,
        system_enabled: systemEnabled,
        manual_mode: manualMode,
        manual_led: manualLed,
        timestamp: Date.now()
      };

      try {
        await fetch(SUPABASE_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          },
          body: JSON.stringify(data)
        });
      } catch (error) {
        console.error('Error:', error);
      }
    }

    async function addToHistory() {
      const historyEntry = {
        state: currentState,
        countdown: countdown,
        mode: systemEnabled ? (manualMode ? 'MANUAL' : 'AUTO') : 'OFF',
        timestamp: Date.now()
      };

      try {
        await fetch(SUPABASE_URL + '_history', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          },
          body: JSON.stringify(historyEntry)
        });
      } catch (error) {
        console.error('Error:', error);
      }
    }

    async function loadHistory() {
      try {
        const response = await fetch(`${SUPABASE_URL}_history?order=id.desc&limit=20`, {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        });
        const data = await response.json();
        history = data;
        updateHistoryTable();
      } catch (error) {
        console.error('Error:', error);
      }
    }

    function updateHistoryTable() {
      const tbody = document.getElementById('historyBody');
      if (history.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">No history available</td></tr>';
        return;
      }
      tbody.innerHTML = history.map(entry => `
        <tr>
          <td>${new Date(entry.timestamp).toLocaleTimeString()}</td>
          <td><strong>${entry.state}</strong></td>
          <td>${entry.countdown}s</td>
          <td>${entry.mode}</td>
        </tr>
      `).join('');
    }

    function toggleSystem() {
      systemEnabled = !systemEnabled;
      manualMode = false;
      manualLed = "";

      const btn = document.getElementById('toggleSystem');
      const statusSpan = document.getElementById('systemStatus');

      if (systemEnabled) {
        btn.innerHTML = '🔄 SYSTEM ACTIVE';
        btn.classList.add('active');
        statusSpan.innerHTML = 'AUTOMATIC';
        statusSpan.className = 'mode-badge mode-auto';
        startCountdown();
      } else {
        btn.innerHTML = '⭕ SYSTEM DISABLED';
        btn.classList.remove('active');
        statusSpan.innerHTML = 'OFF';
        statusSpan.className = 'mode-badge mode-off';
        if (timerInterval) clearInterval(timerInterval);
      }

      // Clear all manual button highlights
      clearManualButtons();
      sendToSupabase();
    }

    function manualControl(action) {
      // Turn off automatic mode
      if (systemEnabled) {
        if (timerInterval) clearInterval(timerInterval);
      }

      // Set manual mode
      systemEnabled = true;
      manualMode = true;
      manualLed = action;

      // Update UI - highlight only the clicked button
      clearManualButtons();

      const btnMap = {
        'RED': 'manualRedBtn',
        'YELLOW': 'manualYellowBtn',
        'GREEN': 'manualGreenBtn',
        'BUZZER': 'buzzerBtn',
        'LED': 'espLedBtn'
      };

      if (btnMap[action]) {
        const activeBtn = document.getElementById(btnMap[action]);
        if (activeBtn) {
          activeBtn.classList.add('active');
        }
      }

      // Update system status display
      document.getElementById('systemStatus').innerHTML = 'MANUAL';
      document.getElementById('systemStatus').className = 'mode-badge mode-manual';
      document.getElementById('toggleSystem').innerHTML = '🔄 MANUAL MODE';
      document.getElementById('toggleSystem').classList.remove('active');

      // Send to ESP32
      sendToSupabase();

      // Auto exit manual mode after 3 seconds for buzzer and LED
      if (action === 'BUZZER' || action === 'LED') {
        setTimeout(() => {
          if (manualMode && manualLed === action) {
            manualMode = false;
            manualLed = "";
            clearManualButtons();
            document.getElementById('systemStatus').innerHTML = 'AUTOMATIC';
            document.getElementById('systemStatus').className = 'mode-badge mode-auto';
            document.getElementById('toggleSystem').innerHTML = '🔄 SYSTEM ACTIVE';
            document.getElementById('toggleSystem').classList.add('active');
            startCountdown();
            sendToSupabase();
          }
        }, 3000);
      }
    }

    function clearManualButtons() {
      const buttons = ['manualRedBtn', 'manualYellowBtn', 'manualGreenBtn', 'buzzerBtn', 'espLedBtn'];
      buttons.forEach(btnId => {
        const btn = document.getElementById(btnId);
        if (btn) btn.classList.remove('active');
      });
    }

    function resetCycle() {
      if (systemEnabled && !manualMode) {
        currentState = "RED";
        countdown = TIMINGS.RED;
        updateDisplay();
        sendToSupabase();
      }
    }

    function changeSpeed(value) {
      speed = parseFloat(value);
      document.getElementById('speedDisplay').innerHTML = speed + 'x';
      startCountdown();
    }

    init();
  </script>
</body>

</html>
